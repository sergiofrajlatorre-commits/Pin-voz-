<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PinVoz">
<title>PinVoz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#1a1f1a;--surface:#1f261f;--surface2:#263026;--accent:#00e5aa;--accent2:#ff3d71;--accent3:#aaff00;--text:#eef2ee;--muted:#7a9070;--border:rgba(255,255,255,0.10);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column;}
header{z-index:100;padding:14px 20px 10px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-size:22px;font-weight:800;letter-spacing:-0.5px;}.logo span{color:var(--accent);}
.pin-count{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:4px 10px;border-radius:20px;}
.pin-count b{color:var(--accent3);}
#map{flex:1;width:100%;z-index:1;}
.map-wrap{position:relative;flex:1;display:flex;flex-direction:column;}
.map-btn{position:absolute;right:14px;z-index:50;width:42px;height:42px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,0.4);}
#locateBtn{top:12px;}#mapTypeBtn{top:62px;}
.gps-badge{position:absolute;left:14px;top:12px;z-index:50;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:6px 10px;display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);box-shadow:0 2px 12px rgba(0,0,0,0.4);}
.gps-led{width:8px;height:8px;border-radius:50%;background:var(--muted);}
.gps-led.ok{background:var(--accent3);box-shadow:0 0 6px var(--accent3);}
.gps-led.wait{background:#ffcc00;animation:pulse 1s infinite;}
.bottom{z-index:100;background:var(--surface);border-top:1px solid var(--border);padding:12px 20px 26px;flex-shrink:0;}

/* PANEL CENTRAL DE ESTADO */
.state-panel{border-radius:14px;padding:14px 16px;margin-bottom:12px;border:1px solid var(–border);background:var(–surface2);min-height:80px;display:flex;flex-direction:column;justify-content:center;}
.state-panel.s-idle{border-color:var(–border);}
.state-panel.s-noting{border-color:#ffcc00;box-shadow:0 0 12px rgba(255,204,0,0.2);}
.state-tag{font-family:‘DM Mono’,monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;color:var(–muted);}
.state-tag.t-noting{color:#ffcc00;}
.state-tag.t-listening{color:var(–accent);}
.state-text{font-family:‘DM Mono’,monospace;font-size:14px;color:var(–text);line-height:1.4;}
.state-hint{font-family:‘DM Mono’,monospace;font-size:10px;color:var(–muted);margin-top:6px;}

/* COLOR INDICATOR */
.color-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.active-color-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);}
.active-color-label{font-family:‘DM Mono’,monospace;font-size:11px;color:var(–muted);}

.btn-row{display:flex;gap:10px;align-items:center;}
.btn-voice{flex:1;height:54px;border-radius:14px;border:none;background:var(–accent);color:#000;font-family:‘Syne’,sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;position:relative;overflow:hidden;}
.btn-voice.on{background:var(–accent2);box-shadow:0 0 20px rgba(255,61,113,0.4);}
.btn-voice.on::after{content:’’;position:absolute;inset:-2px;border-radius:16px;border:2px solid var(–accent2);animation:ring 1s infinite;}
@keyframes ring{0%{transform:scale(1);opacity:1}100%{transform:scale(1.08);opacity:0}}
.btn-icon{width:48px;height:54px;border-radius:14px;border:1px solid var(–border);background:var(–surface2);color:var(–text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.wave{display:none;gap:3px;align-items:center;height:18px;}
.wave.on{display:flex;}
.wave span{width:3px;background:#000;border-radius:2px;animation:wv 0.6s ease-in-out infinite;}
.wave span:nth-child(1){height:6px}.wave span:nth-child(2){animation-delay:.1s;height:12px}.wave span:nth-child(3){animation-delay:.2s;height:18px}.wave span:nth-child(4){animation-delay:.1s;height:12px}.wave span:nth-child(5){height:6px}
@keyframes wv{0%,100%{transform:scaleY(0.5)}50%{transform:scaleY(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:200;display:none;align-items:flex-end;}
.overlay.open{display:flex;}
.modal{width:100%;background:var(–surface);border-radius:24px 24px 0 0;border-top:1px solid var(–border);padding:20px 20px 40px;animation:slideup 0.3s cubic-bezier(0.34,1.56,0.64,1);}
.list-modal{width:100%;background:var(–surface);border-radius:24px 24px 0 0;border-top:1px solid var(–border);padding:20px 20px 40px;max-height:72dvh;overflow-y:auto;animation:slideup 0.3s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.handle{width:36px;height:4px;background:var(–border);border-radius:2px;margin:0 auto 18px;}
.modal-title{font-size:18px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.modal-coords{font-family:‘DM Mono’,monospace;font-size:11px;color:var(–muted);margin-bottom:10px;}
.color-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.color-chip{width:28px;height:28px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform 0.15s;}
.color-chip.active{border-color:#fff;transform:scale(1.2);}
.note-wrap{position:relative;}
.modal textarea{width:100%;background:var(–surface2);border:1px solid var(–border);border-radius:12px;color:var(–text);font-family:‘DM Mono’,monospace;font-size:14px;padding:14px 50px 14px 14px;resize:none;height:90px;outline:none;transition:border-color 0.2s;}
.modal textarea:focus{border-color:var(–accent);}
.btn-voice-note{position:absolute;right:10px;top:10px;width:34px;height:34px;border-radius:10px;border:1px solid var(–border);background:var(–surface);color:var(–text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-voice-note.active{background:var(–accent2);border-color:var(–accent2);animation:pulse 0.8s infinite;}
.modal-btns{display:flex;gap:10px;margin-top:12px;}
.btn-save{flex:1;height:46px;border-radius:12px;border:none;background:var(–accent3);color:#000;font-family:‘Syne’,sans-serif;font-weight:700;font-size:14px;cursor:pointer;}
.btn-del{width:46px;height:46px;border-radius:12px;border:1px solid rgba(255,61,113,0.3);background:transparent;color:var(–accent2);font-size:18px;cursor:pointer;}
.btn-cls{width:46px;height:46px;border-radius:12px;border:1px solid var(–border);background:transparent;color:var(–muted);font-size:18px;cursor:pointer;}
.list-header{font-size:18px;font-weight:800;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.list-close{background:var(–surface2);border:1px solid var(–border);color:var(–text);width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;}
.pin-item{background:var(–surface2);border:1px solid var(–border);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px;}
.pin-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.pin-info{flex:1;min-width:0;}
.pin-name{font-weight:600;font-size:14px;margin-bottom:3px;}
.pin-note{font-family:‘DM Mono’,monospace;font-size:11px;color:var(–muted);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.pin-coords{font-family:‘DM Mono’,monospace;font-size:10px;color:var(–muted);margin-top:3px;}
.empty{text-align:center;color:var(–muted);font-family:‘DM Mono’,monospace;font-size:12px;padding:30px 0;}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-70px);background:var(–surface);border:1px solid var(–border);border-radius:30px;padding:10px 20px;font-size:13px;font-weight:600;z-index:300;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.accent{color:var(–accent3);}
.toast.error{color:var(–accent2);}
.leaflet-popup-content-wrapper{background:#1f261f !important;border:1px solid rgba(255,255,255,0.1) !important;border-radius:12px !important;color:#eef2ee !important;box-shadow:0 8px 30px rgba(0,0,0,0.6) !important;}
.leaflet-popup-tip{background:#1f261f !important;}
.pop-title{font-family:‘Syne’,sans-serif;font-weight:700;font-size:13px;margin-bottom:4px;}
.pop-note{font-family:‘DM Mono’,monospace;font-size:11px;color:#7a9070;white-space:pre-wrap;max-width:160px;}
.pop-edit{margin-top:8px;font-family:‘Syne’,sans-serif;font-size:11px;font-weight:600;color:#00e5aa;cursor:pointer;}
</style>

</head>
<body>
<header>
  <div class="logo">Pin<span>Voz</span></div>
  <div class="pin-count">Pins: <b id="counter">0</b></div>
</header>
<div class="map-wrap">
  <div id="map"></div>
  <div class="gps-badge">
    <div class="gps-led wait" id="gpsLed"></div>
    <span id="gpsLabel">GPS</span>
  </div>
  <button class="map-btn" id="locateBtn" onclick="goToMe()">📍</button>
  <button class="map-btn" id="mapTypeBtn" onclick="toggleMapType()">🛰️</button>
</div>

<div class="bottom">
  <div class="color-row">
    <div class="active-color-dot" id="activeColorDot" style="background:#00e5aa"></div>
    <span class="active-color-label" id="activeColorLabel">Color: Verde</span>
  </div>
  <div class="state-panel s-idle" id="statePanel">
    <div class="state-tag t-listening" id="stateTag">ESPERANDO</div>
    <div class="state-text" id="stateText">Pulsa el micrófono para empezar</div>
    <div class="state-hint" id="stateHint">"marcar" · "marcar rojo/azul/..." · "guardar"</div>
  </div>
  <div class="btn-row">
    <button class="btn-voice" id="voicebtn" onclick="toggleVoice()">
      <div class="wave" id="wave"><span></span><span></span><span></span><span></span><span></span></div>
      <span id="btnlabel">🎤 Activar</span>
    </button>
    <button class="btn-icon" onclick="openList()">☰</button>
  </div>
</div>

<!-- MODAL EDITAR -->

<div class="overlay" id="editOverlay" onclick="if(event.target===this)closeEdit()">
  <div class="modal">
    <div class="handle"></div>
    <div class="modal-title">
      <span id="editDot" style="width:16px;height:16px;border-radius:50%;display:inline-block;flex-shrink:0;"></span>
      <span id="editName"></span>
    </div>
    <div class="modal-coords" id="editCoords"></div>
    <div class="color-chips" id="colorChips"></div>
    <div class="note-wrap">
      <textarea id="editNote" placeholder="Escribe o pulsa 🎤 para dictar..."></textarea>
      <button class="btn-voice-note" id="noteVoiceBtn" onclick="toggleNoteVoice()">🎤</button>
    </div>
    <div class="modal-btns">
      <button class="btn-save" onclick="saveNote()">Guardar</button>
      <button class="btn-del" onclick="deletePin()">🗑</button>
      <button class="btn-cls" onclick="closeEdit()">✕</button>
    </div>
  </div>
</div>

<!-- MODAL LISTA -->

<div class="overlay" id="listOverlay" onclick="if(event.target===this)closeList()">
  <div class="list-modal">
    <div class="handle"></div>
    <div class="list-header">Todos los pins <button class="list-close" onclick="closeList()">✕</button></div>
    <div id="listContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── COLORES ──────────────────────────────────────────────
const COLORS = {
  verde:    '#00e5aa',
  rojo:     '#ff3d71',
  azul:     '#2979ff',
  amarillo: '#ffcc00',
  naranja:  '#ff6d00',
  morado:   '#d500f9',
  blanco:   '#eeeeee',
  negro:    '#444444',
};
const CKEYS = Object.keys(COLORS);
const DEF = 'verde';

// ── ESTADO ───────────────────────────────────────────────
let pins = [];
try { pins = JSON.parse(localStorage.getItem('pinvoz')||'[]'); } catch(e){}
let currentId=null, map, userDot, recog, listening=false;
let noteRecog=null, noteListening=false, isSat=false;
let editColor=DEF;

// MODOS: 'idle' = esperando "marcar" | 'noting' = acumulando nota
let mode = 'idle';
let pendingColor = DEF;   // color del pin pendiente de guardar
let noteAccum = '';        // nota acumulada
let noteBase = '';         // base confirmada (isFinal)
let audioCtx = null;

// GPS continuo en caché
let cachedPos = null;

// ── AUDIO ────────────────────────────────────────────────
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function beep(freqs, dur) {
  try {
    const ctx = getAudio();
    freqs.forEach((f,i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f;
      g.gain.setValueAtTime(0.25, ctx.currentTime + i*dur);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*dur + dur);
      o.start(ctx.currentTime + i*dur);
      o.stop(ctx.currentTime + i*dur + dur);
    });
  } catch(e){}
}
// 1 pitido al marcar, 2 al guardar
function beepMark() { beep([880], 0.12); }
function beepSave()  { beep([660, 1100], 0.12); }

// ── GPS CONTINUO ─────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) return;
  navigator.geolocation.watchPosition(pos => {
    cachedPos = pos;
    setGPS('ok');
    const {latitude:lat,longitude:lng} = pos.coords;
    if (userDot) userDot.setLatLng([lat,lng]);
    else {
      userDot = L.circleMarker([lat,lng],{radius:8,fillColor:'#00e5aa',color:'#000',weight:2,fillOpacity:0.9}).addTo(map);
      map.setView([lat,lng],17);
    }
  }, ()=>setGPS('err'), {enableHighAccuracy:true,maximumAge:2000,timeout:10000});
}
function setGPS(s){
  const led=document.getElementById('gpsLed');
  const lbl=document.getElementById('gpsLabel');
  led.className='gps-led '+(s==='ok'?'ok':'wait');
  lbl.textContent=s==='ok'?'GPS':'...';
}
function goToMe(){
  if(cachedPos){const{latitude:lat,longitude:lng}=cachedPos.coords;map.setView([lat,lng],18);}
}

// ── MAPA ─────────────────────────────────────────────────
const L=window.L;
map=L.map('map',{zoomControl:false,attributionControl:false}).setView([40.4168,-3.7038],15);
const topoLayer=L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{maxZoom:17});
const satLayer=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:20});
const satLabels=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',{maxZoom:20,opacity:0.8});
topoLayer.addTo(map);

function toggleMapType(){
  const btn=document.getElementById('mapTypeBtn');
  if(!isSat){map.removeLayer(topoLayer);satLayer.addTo(map);satLabels.addTo(map);btn.innerHTML='🗺️';isSat=true;}
  else{map.removeLayer(satLayer);map.removeLayer(satLabels);topoLayer.addTo(map);btn.innerHTML='🛰️';isSat=false;}
}

pins.forEach(addMarker);
updateCounter();
startGPS();
window.addEventListener('load',()=>setTimeout(startVoice,1000));

// ── LÓGICA DE VOZ ────────────────────────────────────────
function startVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ setState('idle','Sin voz','Usa Safari en iPhone',''); return; }
  if(listening) return;

  recog=new SR();
  recog.lang='es-ES';
  recog.continuous=true;
  recog.interimResults=true;

  recog.onstart=()=>{
    listening=true;
    document.getElementById('voicebtn').classList.add('on');
    document.getElementById('wave').classList.add('on');
    document.getElementById('btnlabel').style.display='none';
    setState('idle','ESCUCHANDO','Di "marcar" para empezar','"marcar rojo/azul/amarillo/naranja/morado"');
  };

  recog.onend=()=>{ if(listening) recog.start(); };

  recog.onerror=e=>{
    if(e.error==='not-allowed'){
      listening=false;
      document.getElementById('voicebtn').classList.remove('on');
      document.getElementById('wave').classList.remove('on');
      document.getElementById('btnlabel').style.display='';
      setState('idle','SIN PERMISO','Activa micrófono en Ajustes › Safari','');
    } else {
      if(listening) setTimeout(()=>recog.start(),500);
    }
  };

  recog.onresult=e=>{
    const res=e.results[e.results.length-1];
    const raw=res[0].transcript;
    const t=raw.toLowerCase().trim();
    const isFinal=res.isFinal;

    if(mode==='idle'){
      // Mostrar lo que escucha
      setState('idle','ESCUCHANDO','"'+t+'"','"marcar" · "marcar rojo/azul/..."');

      if(isFinal){
        // Detectar color
        const colorFound = CKEYS.find(k=>t.includes(k));
        // Detectar comando marcar
        const isMark = ['marcar','marca','pin','punto'].some(w=>t.includes(w));
        if(isMark){
          pendingColor = colorFound || DEF;
          noteAccum = '';
          noteBase = '';
          mode = 'noting';
          beepMark();
          setActiveColor(pendingColor);
          setState('noting','NOTA — di lo que quieras...','...','di "guardar" cuando termines');
        }
      }

    } else if(mode==='noting'){

      if(isFinal){
        // ¿Es comando guardar?
        if(['guardar','guarda','listo','siguiente','ok'].some(w=>t.includes(w))){
          guardarPin();
          return;
        }
        // ¿Es comando cancelar?
        if(['cancelar','descarta','borra'].some(w=>t.includes(w))){
          mode='idle';
          noteAccum=''; noteBase='';
          setState('idle','CANCELADO','Nota descartada','"marcar" para el siguiente');
          return;
        }
        // Acumular nota — ignorar "marcar" accidental dentro de nota
        noteBase = (noteBase+' '+raw).trim();
        noteAccum = noteBase;
        setState('noting','NOTA',''+noteAccum,'di "guardar" cuando termines');
      } else {
        // Preview en tiempo real
        const preview=(noteBase+' '+raw).trim();
        setState('noting','NOTA',''+preview,'di "guardar" cuando termines');
      }
    }
  };

  recog.start();
}

function guardarPin(){
  if(!cachedPos){ toast('Sin GPS','error'); return; }
  const {latitude:lat,longitude:lng}=cachedPos.coords;
  const pin={
    id:Date.now(), lat, lng,
    name:`Pin #${pins.length+1}`,
    note:noteAccum.trim(),
    color:pendingColor,
    date:new Date().toLocaleString('es-ES')
  };
  pins.push(pin);
  save();
  addMarker(pin);
  updateCounter();
  beepSave();
  toast('✓ '+pin.name+' guardado','accent');
  mode='idle';
  noteAccum=''; noteBase='';
  setState('idle','GUARDADO ✓',pin.name+' — '+COLORS[pendingColor].replace('#','#'),'"marcar" para el siguiente');
  // Volver a estado normal tras 2s
  setTimeout(()=>{ if(mode==='idle') setState('idle','ESCUCHANDO','Di "marcar" para empezar','"marcar rojo/azul/amarillo/naranja/morado"'); },2000);
}

function toggleVoice(){
  if(listening){
    listening=false; recog&&recog.stop(); mode='idle';
    document.getElementById('voicebtn').classList.remove('on');
    document.getElementById('wave').classList.remove('on');
    document.getElementById('btnlabel').style.display='';
    document.getElementById('btnlabel').textContent='🎤 Activar';
    setState('idle','PAUSADO','Pulsa para reactivar','');
  } else {
    startVoice();
  }
}

// ── UI STATE ─────────────────────────────────────────────
function setState(panelMode, tag, text, hint){
  const panel=document.getElementById('statePanel');
  const tagEl=document.getElementById('stateTag');
  const textEl=document.getElementById('stateText');
  const hintEl=document.getElementById('stateHint');
  panel.className='state-panel s-'+panelMode;
  tagEl.className='state-tag t-'+(panelMode==='noting'?'noting':'listening');
  tagEl.textContent=tag;
  textEl.textContent=text;
  hintEl.textContent=hint;
}

function setActiveColor(k){
  document.getElementById('activeColorDot').style.background=COLORS[k];
  document.getElementById('activeColorLabel').textContent='Color: '+k.charAt(0).toUpperCase()+k.slice(1);
}

// ── MARCADOR ─────────────────────────────────────────────
function pinHex(pin){ return COLORS[pin.color||DEF]||COLORS[DEF]; }
function makeIcon(pin){
  const h=pinHex(pin);
  return L.divIcon({className:'',html:`<div style="width:28px;height:28px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid rgba(0,0,0,0.6);background:${h};box-shadow:0 2px 12px ${h}99;"></div>`,iconSize:[28,28],iconAnchor:[14,28],popupAnchor:[0,-30]});
}
function addMarker(pin){
  const m=L.marker([pin.lat,pin.lng],{icon:makeIcon(pin)}).addTo(map);
  m.bindPopup(()=>{
    const p=pins.find(x=>x.id===pin.id)||pin;
    return`<div class="pop-title" style="color:${pinHex(p)}">${p.name}</div><div class="pop-note">${p.note||'(sin nota)'}</div><div class="pop-note" style="margin-top:4px;opacity:.5">${p.date}</div><div class="pop-edit" onclick="openEdit(${pin.id});map.closePopup()">✏️ Editar</div>`;
  });
  pin._m=m;
}
function updateMarkerIcon(pin){ if(pin._m) pin._m.setIcon(makeIcon(pin)); }

// ── MODAL EDITAR ─────────────────────────────────────────
function openEdit(id){
  currentId=id; const p=pins.find(x=>x.id===id); if(!p) return;
  editColor=p.color||DEF;
  document.getElementById('editName').textContent=p.name;
  document.getElementById('editDot').style.background=pinHex(p);
  document.getElementById('editCoords').textContent=`${p.lat.toFixed(6)}, ${p.lng.toFixed(6)} · ${p.date}`;
  document.getElementById('editNote').value=p.note||'';
  document.getElementById('colorChips').innerHTML=CKEYS.map(k=>`<div class="color-chip${k===editColor?' active':''}" style="background:${COLORS[k]}" onclick="selectColor('${k}',this)" title="${k}"></div>`).join('');
  document.getElementById('editOverlay').classList.add('open');
}
function selectColor(k,el){
  editColor=k;
  document.getElementById('editDot').style.background=COLORS[k];
  document.querySelectorAll('.color-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
}
function closeEdit(){ stopNoteVoice(); document.getElementById('editOverlay').classList.remove('open'); currentId=null; }
function saveNote(){
  if(!currentId) return; const p=pins.find(x=>x.id===currentId); if(!p) return;
  p.note=document.getElementById('editNote').value; p.color=editColor;
  updateMarkerIcon(p); save(); toast('✓ Guardado','accent'); closeEdit();
}
function deletePin(){
  if(!currentId) return; const i=pins.findIndex(x=>x.id===currentId); if(i===-1) return;
  if(pins[i]._m) pins[i]._m.remove();
  pins.splice(i,1); save(); updateCounter(); toast('Eliminado','error'); closeEdit();
}

// ── LISTA ────────────────────────────────────────────────
function openList(){
  const el=document.getElementById('listContent');
  el.innerHTML=pins.length?pins.map(p=>`<div class="pin-item" onclick="flyTo(${p.id})"><div class="pin-dot" style="background:${pinHex(p)}"></div><div class="pin-info"><div class="pin-name">${p.name}</div><div class="pin-note">${p.note||'(sin nota)'}</div><div class="pin-coords">${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}</div></div></div>`).join(''):'<div class="empty">No hay pins todavía</div>';
  document.getElementById('listOverlay').classList.add('open');
}
function closeList(){ document.getElementById('listOverlay').classList.remove('open'); }
function flyTo(id){
  const p=pins.find(x=>x.id===id); if(!p) return;
  closeList(); map.flyTo([p.lat,p.lng],18,{duration:1});
  setTimeout(()=>p._m&&p._m.openPopup(),1100);
}

// ── VOZ NOTA MANUAL ──────────────────────────────────────
function toggleNoteVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('Voz no disponible','error');return;}
  if(noteListening){stopNoteVoice();return;}
  noteRecog=new SR(); noteRecog.lang='es-ES'; noteRecog.continuous=true; noteRecog.interimResults=true;
  const ta=document.getElementById('editNote'); const btn=document.getElementById('noteVoiceBtn');
  let base=ta.value;
  noteRecog.onstart=()=>{noteListening=true;btn.classList.add('active');btn.innerHTML='⏹️';};
  noteRecog.onend=()=>{if(noteListening)noteRecog.start();};
  noteRecog.onerror=()=>{if(noteListening)setTimeout(()=>noteRecog.start(),300);};
  noteRecog.onresult=e=>{
    const last=e.results[e.results.length-1]; const t=last[0].transcript;
    if(last.isFinal){base=(base+' '+t).trim();ta.value=base;}
    else{ta.value=(base+' '+t).trim();}
  };
  noteRecog.start();
}
function stopNoteVoice(){
  if(noteListening){noteListening=false;noteRecog&&noteRecog.stop();const btn=document.getElementById('noteVoiceBtn');if(btn){btn.classList.remove('active');btn.innerHTML='🎤';}}
}

// ── UTILS ────────────────────────────────────────────────
function updateCounter(){ document.getElementById('counter').textContent=pins.length; }
function save(){ localStorage.setItem('pinvoz',JSON.stringify(pins.map(({_m,...r})=>r))); }
function toast(msg,type=''){
  const t=document.getElementById('toast'); t.textContent=msg;
  t.className=`toast show ${type}`; setTimeout(()=>t.className='toast',2500);
}
</script>
